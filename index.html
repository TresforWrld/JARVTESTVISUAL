<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J.A.R.V.I.S.</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #020c14;
    font-family: 'Share Tech Mono', monospace;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    user-select: none;
  }

  body::before {
    content:'';
    position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(0,180,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,180,255,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events:none;
  }

  .corner { position:fixed; width:40px; height:40px; opacity:0.4; }
  .corner.tl { top:20px; left:20px; border-top:1px solid #00b4ff; border-left:1px solid #00b4ff; }
  .corner.tr { top:20px; right:20px; border-top:1px solid #00b4ff; border-right:1px solid #00b4ff; }
  .corner.bl { bottom:20px; left:20px; border-bottom:1px solid #00b4ff; border-left:1px solid #00b4ff; }
  .corner.br { bottom:20px; right:20px; border-bottom:1px solid #00b4ff; border-right:1px solid #00b4ff; }

  .statusbar {
    position:fixed; top:20px; left:50%; transform:translateX(-50%);
    font-size:9px; letter-spacing:3px; color:rgba(0,180,255,0.4);
    text-transform:uppercase;
    animation: fadePulse 4s ease infinite;
    white-space: nowrap;
  }

  @keyframes fadePulse { 0%,100%{opacity:0.4} 50%{opacity:0.9} }

  .main {
    display:flex;
    flex-direction:column;
    align-items:center;
    position:relative;
    z-index:1;
  }

  /* Ring system */
  .reactor-wrap {
    position:relative;
    width:220px; height:220px;
    display:flex; align-items:center; justify-content:center;
  }

  .ring {
    position:absolute;
    border-radius:50%;
    border-style:solid;
    border-color:transparent;
  }

  .ring-1 {
    width:220px; height:220px;
    border-width:1px;
    border-top-color:rgba(0,180,255,0.6);
    border-right-color:rgba(0,180,255,0.12);
    animation:spin 8s linear infinite;
  }
  .ring-2 {
    width:184px; height:184px;
    border-width:1px;
    border-top-color:rgba(0,180,255,0.4);
    border-left-color:rgba(0,180,255,0.08);
    animation:spin 12s linear infinite reverse;
  }
  .ring-3 {
    width:150px; height:150px;
    border-width:1px;
    border-bottom-color:rgba(0,180,255,0.5);
    border-right-color:rgba(0,180,255,0.08);
    animation:spin 6s linear infinite;
  }
  .ring-4 {
    width:120px; height:120px;
    border-width:1px;
    border-top-color:rgba(0,220,255,0.7);
    border-left-color:rgba(0,220,255,0.12);
    animation:spin 4s linear infinite reverse;
  }

  @keyframes spin { to { transform:rotate(360deg); } }

  /* Tick marks */
  .ticks { position:absolute; width:220px; height:220px; border-radius:50%; }
  .tick {
    position:absolute;
    width:1px; height:8px;
    background:rgba(0,180,255,0.45);
    left:50%; top:0;
    transform-origin:bottom center;
  }

  /* Ripple waves */
  .wave-wrap {
    position:absolute;
    width:220px; height:220px;
    border-radius:50%;
    pointer-events:none;
    opacity:0;
    transition:opacity 0.4s;
  }
  .wave-wrap.active { opacity:1; }
  .wave {
    position:absolute; inset:-10px;
    border-radius:50%;
    border:1px solid rgba(0,200,255,0.55);
    animation:waveOut 1.5s ease-out infinite;
  }
  .wave:nth-child(2){ animation-delay:0.5s; }
  .wave:nth-child(3){ animation-delay:1s; }
  @keyframes waveOut {
    0%{ transform:scale(1); opacity:0.8; }
    100%{ transform:scale(1.45); opacity:0; }
  }

  /* Core */
  .core {
    width:80px; height:80px;
    border-radius:50%;
    background:radial-gradient(circle at 40% 35%, rgba(120,220,255,0.9), rgba(0,140,220,0.6) 40%, rgba(0,60,120,0.4) 70%, transparent);
    position:relative; z-index:2;
    animation:corePulse 3s ease-in-out infinite;
    cursor:pointer;
  }
  .core::before {
    content:'';
    position:absolute; inset:8px;
    border-radius:50%;
    background:radial-gradient(circle at 40% 35%, rgba(255,255,255,0.95), rgba(140,220,255,0.8) 50%, rgba(0,100,200,0.4));
    animation:fadePulse 3s ease-in-out infinite;
  }
  @keyframes corePulse {
    0%,100%{ box-shadow:0 0 20px rgba(0,160,255,0.4), 0 0 60px rgba(0,120,255,0.12); }
    50%{ box-shadow:0 0 35px rgba(0,180,255,0.7), 0 0 90px rgba(0,140,255,0.22); }
  }

  /* State label */
  .state-label {
    margin-top:28px;
    font-family:'Orbitron', sans-serif;
    font-size:11px;
    font-weight:300;
    letter-spacing:6px;
    color:rgba(0,180,255,0.65);
    text-transform:uppercase;
    animation:fadePulse 4s ease infinite;
  }

  /* Response */
  .response-area {
    margin-top:22px;
    width:380px;
    min-height:56px;
    text-align:center;
    padding:0 16px;
  }
  .response-text {
    font-size:13px;
    color:rgba(180,220,255,0.85);
    line-height:1.75;
    letter-spacing:0.5px;
    opacity:0;
    transition:opacity 0.6s;
  }
  .response-text.visible { opacity:1; }

  /* Thinking dots */
  .thinking { display:none; gap:6px; align-items:center; justify-content:center; margin-top:10px; }
  .thinking.show { display:flex; }
  .dot {
    width:5px; height:5px; border-radius:50%;
    background:rgba(0,200,255,0.6);
    animation:dotPop 1.2s ease infinite;
  }
  .dot:nth-child(2){ animation-delay:0.2s; }
  .dot:nth-child(3){ animation-delay:0.4s; }
  @keyframes dotPop {
    0%,80%,100%{ transform:scale(0.6); opacity:0.4; }
    40%{ transform:scale(1); opacity:1; }
  }

  /* Mic button */
  .mic-btn {
    margin-top:32px;
    width:52px; height:52px;
    border-radius:50%;
    background:rgba(0,40,80,0.5);
    border:1px solid rgba(0,180,255,0.25);
    color:rgba(0,180,255,0.75);
    font-size:20px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    transition:all 0.3s;
  }
  .mic-btn:hover {
    border-color:rgba(0,220,255,0.6);
    background:rgba(0,60,120,0.45);
    color:rgba(0,220,255,1);
  }
  .mic-btn.listening {
    border-color:rgba(0,220,255,0.9);
    background:rgba(0,60,120,0.75);
    animation:micPulse 1s ease infinite;
  }
  @keyframes micPulse {
    0%,100%{ box-shadow:0 0 0 0 rgba(0,200,255,0.4); }
    50%{ box-shadow:0 0 0 12px rgba(0,200,255,0); }
  }

  /* Bottom stats */
  .bottom-row {
    position:fixed; bottom:28px;
    left:50%; transform:translateX(-50%);
    display:flex; gap:32px; align-items:center;
  }
  .stat { display:flex; flex-direction:column; align-items:center; gap:4px; }
  .stat-val {
    font-family:'Orbitron', sans-serif;
    font-size:13px; font-weight:400;
    color:rgba(0,200,255,0.75);
    letter-spacing:2px;
  }
  .stat-label { font-size:8px; letter-spacing:3px; color:rgba(0,120,180,0.45); text-transform:uppercase; }
  .divider { width:1px; height:28px; background:rgba(0,120,180,0.2); }

  /* Transcript input (fallback) */
  .input-wrap {
    margin-top:20px;
    display:flex; gap:8px; align-items:center;
    width:340px;
  }
  .text-input {
    flex:1;
    background:rgba(0,30,60,0.6);
    border:1px solid rgba(0,180,255,0.18);
    color:rgba(180,220,255,0.9);
    font-family:'Share Tech Mono', monospace;
    font-size:12px;
    padding:8px 12px;
    outline:none;
    letter-spacing:1px;
    transition:border-color 0.3s;
  }
  .text-input::placeholder { color:rgba(0,120,180,0.35); }
  .text-input:focus { border-color:rgba(0,180,255,0.5); }
  .send-btn {
    width:36px; height:36px;
    background:rgba(0,40,80,0.5);
    border:1px solid rgba(0,180,255,0.25);
    color:rgba(0,180,255,0.75);
    font-size:15px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    transition:all 0.25s;
    flex-shrink:0;
  }
  .send-btn:hover { border-color:rgba(0,220,255,0.6); color:rgba(0,220,255,1); }
</style>
</head>
<body>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="statusbar" id="statusbar"></div>

<div class="main">

  <div class="reactor-wrap">
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="ring ring-3"></div>
    <div class="ring ring-4"></div>
    <div class="ticks" id="ticks"></div>
    <div class="wave-wrap" id="waves">
      <div class="wave"></div>
      <div class="wave"></div>
      <div class="wave"></div>
    </div>
    <div class="core" id="core" onclick="toggleListen()" title="Tap to speak"></div>
  </div>

  <div class="state-label" id="stateLabel"></div>

  <div class="response-area">
    <div class="response-text" id="responseText"></div>
    <div class="thinking" id="thinking">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
  </div>

  <button class="mic-btn" id="micBtn" onclick="toggleListen()" title="Tap to speak" aria-label="Activate voice input">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="9" y="2" width="6" height="12" rx="3"/>
      <path d="M5 10a7 7 0 0 0 14 0"/>
      <line x1="12" y1="19" x2="12" y2="22"/>
      <line x1="8" y1="22" x2="16" y2="22"/>
    </svg>
  </button>

  <!-- Text fallback for browsers without mic -->
  <div class="input-wrap">
    <input class="text-input" id="textInput" type="text" placeholder="or type a command..." onkeydown="if(event.key==='Enter')sendText()">
    <button class="send-btn" onclick="sendText()" title="Send">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>

</div>

<div class="bottom-row">
  <div class="stat">
    <div class="stat-val" id="timeVal">--:--</div>
    <div class="stat-label">Local Time</div>
  </div>
  <div class="divider"></div>
  <div class="stat">
    <div class="stat-val" id="dayVal">---</div>
    <div class="stat-label">Day</div>
  </div>
  <div class="divider"></div>
  <div class="stat">
    <div class="stat-val">100%</div>
    <div class="stat-label">Arc Power</div>
  </div>
  <div class="divider"></div>
  <div class="stat">
    <div class="stat-val" id="dateVal">--</div>
    <div class="stat-label">Date</div>
  </div>
</div>

<script>
  // ── Tick marks ──
  const ticksEl = document.getElementById('ticks');
  for (let i = 0; i < 12; i++) {
    const t = document.createElement('div');
    t.className = 'tick';
    const angle = i * 30;
    const rad = (angle - 90) * Math.PI / 180;
    const r = 109; // radius to place tick
    const cx = 110, cy = 110;
    const x = cx + r * Math.cos(rad);
    const y = cy + r * Math.sin(rad);
    t.style.cssText = `
      position:absolute;
      width:1px; height:8px;
      background:rgba(0,180,255,0.45);
      left:${x}px; top:${y}px;
      transform:rotate(${angle}deg);
      transform-origin:top center;
    `;
    ticksEl.appendChild(t);
  }

  // ── Clock ──
  const DAYS = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    document.getElementById('timeVal').textContent = h + ':' + m;
    document.getElementById('dayVal').textContent = DAYS[now.getDay()];
    document.getElementById('dateVal').textContent = now.getDate();
  }
  updateClock();
  setInterval(updateClock, 10000);

  // ── Voice ──
  let listening = false;
  let recognition = null;
  const synth = window.speechSynthesis;
  let voices = [];

  function loadVoices() { voices = synth.getVoices(); }
  loadVoices();
  if (speechSynthesis.onvoiceschanged !== undefined) {
    speechSynthesis.onvoiceschanged = loadVoices;
  }

  function getBestVoice() {
    const preferred = ['Daniel','Google UK English Male','Microsoft George','Arthur','Google UK English'];
    for (const name of preferred) {
      const v = voices.find(v => v.name.includes(name));
      if (v) return v;
    }
    return voices.find(v => v.lang === 'en-GB') ||
           voices.find(v => v.lang.startsWith('en')) ||
           voices[0];
  }

  function speak(text) {
    synth.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    const voice = getBestVoice();
    if (voice) utt.voice = voice;
    utt.rate = 0.88;
    utt.pitch = 0.88;
    utt.volume = 1;
    synth.speak(utt);
  }

  // ── Responses ──
  function getResponse(transcript) {
    const t = transcript.toLowerCase();
    const now = new Date();

    if (t.includes('time'))
      return `The current time is ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}, sir.`;

    if (t.includes('date') || t.includes('today') || t.includes('day'))
      return `Today is ${now.toLocaleDateString('en-GB',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}.`;

    if (t.includes('hello') || t.includes('hi ') || t.includes('hey') || t.includes('good'))
      return `Good to hear from you, sir. All systems are fully operational.`;

    if (t.includes('power') || t.includes('reactor') || t.includes('arc'))
      return `Arc reactor is running at peak efficiency. Output is stable at one hundred percent.`;

    if (t.includes('weather') || t.includes('temperature') || t.includes('outside'))
      return `I cannot access live weather without an API connection, sir. However, ambient lab sensors show twenty two degrees Celsius.`;

    if (t.includes('your name') || t.includes('who are you') || t.includes('jarvis'))
      return `I am J.A.R.V.I.S. — Just A Rather Very Intelligent System. At your service, as always.`;

    if (t.includes('help') || t.includes('what can you'))
      return `I can tell you the time, date, system status, and respond to general queries. More capabilities can be added at any time, sir.`;

    if (t.includes('status') || t.includes('system') || t.includes('diagnostics'))
      return `All systems nominal. Neural interface: online. Arc reactor: stable. No threats detected.`;

    if (t.includes('thank'))
      return `Of course, sir. That is what I am here for.`;

    if (t.includes('music') || t.includes('play'))
      return `Music playback requires a media integration, sir. I recommend connecting a Spotify or audio API.`;

    if (t.includes('weather'))
      return `Live weather requires an API key, sir. I suggest integrating OpenWeatherMap.`;

    return `Understood. You said: "${transcript}". I have logged the query. Awaiting further instructions, sir.`;
  }

  // ── UI State ──
  function setState(s) {
    const label = document.getElementById('stateLabel');
    const waves = document.getElementById('waves');
    const micBtn = document.getElementById('micBtn');
    const statusbar = document.getElementById('statusbar');

    if (s === 'listening') {
      label.textContent = 'LISTENING';
      waves.classList.add('active');
      micBtn.classList.add('listening');
      statusbar.textContent = 'VOICE INPUT ACTIVE';
    } else if (s === 'thinking') {
      label.textContent = 'PROCESSING';
      waves.classList.remove('active');
      micBtn.classList.remove('listening');
      document.getElementById('thinking').classList.add('show');
      document.getElementById('responseText').classList.remove('visible');
      statusbar.textContent = 'NEURAL PROCESSING';
    } else {
      label.textContent = 'STANDBY';
      waves.classList.remove('active');
      micBtn.classList.remove('listening');
      document.getElementById('thinking').classList.remove('show');
      statusbar.textContent = 'SYSTEM ONLINE — STARK INDUSTRIES';
    }
  }

  function showResponse(text) {
    const el = document.getElementById('responseText');
    el.textContent = text;
    el.classList.add('visible');
  }

  // ── Voice toggle ──
  function toggleListen() {
    if (listening) { stopListening(); return; }
    startListening();
  }

  function startListening() {
    if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
      const msg = 'Voice recognition is not supported in this browser, sir. Please use Google Chrome, or type a command below.';
      showResponse(msg);
      speak(msg);
      return;
    }

    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.lang = 'en-GB';
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    recognition.onstart = () => {
      listening = true;
      setState('listening');
    };

    recognition.onresult = (e) => {
      const transcript = e.results[0][0].transcript;
      listening = false;
      setState('thinking');
      setTimeout(() => {
        const reply = getResponse(transcript);
        setState('idle');
        showResponse(reply);
        speak(reply);
      }, 700);
    };

    recognition.onerror = () => {
      listening = false;
      setState('idle');
      const msg = 'I did not catch that, sir. Please try again.';
      showResponse(msg);
      speak(msg);
    };

    recognition.onend = () => {
      if (listening) { listening = false; setState('idle'); }
    };

    recognition.start();
  }

  function stopListening() {
    if (recognition) recognition.stop();
    listening = false;
    setState('idle');
  }

  // ── Text fallback ──
  function sendText() {
    const input = document.getElementById('textInput');
    const val = input.value.trim();
    if (!val) return;
    input.value = '';
    setState('thinking');
    setTimeout(() => {
      const reply = getResponse(val);
      setState('idle');
      showResponse(reply);
      speak(reply);
    }, 700);
  }

  // ── Boot greeting ──
  setTimeout(() => {
    const greeting = 'allow me to introduce myself, I am Jarvis, a virtual artificial intelligence and I'm here to assist you with a variety of tasks as best I can, 24 hours a day, 7 days a week, importing all preferences from home interface. Systems are fully operational.';
    showResponse(greeting);
    speak(greeting);
  }, 1000);
</script>
</body>
</html>
